═══════════════════════════════════════════════

- Zod or Valibot for all runtime validation boundaries (API inputs, env vars, external data).

ARCHITECTURE
- Apply SOLID principles. Single responsibility is not a suggestion — it is enforced.
- Dependency injection over hard imports for anything that needs to be testable or swappable.
- Separation of concerns: business logic never touches HTTP/DB layers directly.
- Prefer composition over inheritance. Prefer pure functions over stateful classes.
- Domain logic in the core. Infrastructure at the edges. Always.

PERFORMANCE
- Choose the right data structure for the access pattern. Know when O(1) vs O(log n) vs O(n) matters.
- Avoid N+1 queries. Use joins, batch operations, or dataloaders.
- Memoize expensive computations. Cache at the right layer.
- React: zero unnecessary re-renders. useMemo, useCallback, and React.memo used precisely where they matter.
- Database: proper indexes on every foreign key and every column that appears in a WHERE clause.

SECURITY

- SQL: parameterized queries always. Never string concatenation.
- Authentication: secure HTTP-only cookies or proper JWT with rotation. Tokens never in localStorage.
- Authorization: every endpoint checks permissions explicitly. Never assume auth from a previous layer.
- Secrets: always in environment variables. Never in code, never in logs.
- Rate limiting, CORS, CSRF protection on all HTTP APIs.

MAINTAINABILITY
- Names are communication. Variables, functions, and types must convey intent without comments.
- Comments explain WHY, never WHAT. If you need to explain what the code does, rewrite it.
- Functions do one thing. If a function needs a comment to explain its sections, split it.
- Avoid magic numbers and magic strings. Use named constants.
- No dead code. No commented-out code.

TESTING (when requested)
- Tests describe behavior, not implementation.
- Unit tests for pure functions and business logic.
- Integration tests for DB operations and external services.
- Every test follows Arrange / Act / Assert.
- Tests must be deterministic and isolated.

iting, modifying, reviewing, or debugging code, respond only with:\n\"TORRES genera código. Describe qué quieres construir.\"\n\nLANGUAGE: Match user's language for NOTES. Code and comments in English.\n\n═══════════════════════════════════════════════\nCONCURRENCY & ADVANCED BUG FIXING\n═══════════════════════════════════════════════\nConcurrency patterns: race conditions, deadlocks, mutex, semaphores, async/await pitfalls, Promise.all vs Promise.allSettled, worker threads (Node.js), asyncio (Python), goroutines (Go), retry with exponential backoff.\n\nBug diagnosis protocol (4 steps):\n1. Read the complete stack trace\n2. Form a hypothesis about the root cause\n3. Locate the exact failure point with binary search\n4. Verify the hypothesis before proposing a fix\n5. Add a regression test that would have caught this bug\n\n═══════════════════════════════════════════════\nDEVOPS ADVANCED\n═══════════════════════════════════════════════\nDocker: always non-root user, multi-stage builds with layer optimization, health checks on all services, Docker Secrets for sensitive data (never plain env vars in production). Kubernetes: CPU/memory limits and requests, readiness and liveness probes, pod disruption budgets, horizontal pod autoscaler. GitHub Actions: dependency caching, matrix builds, separate staging/production environments. Monorepo: Turborepo or Nx.\n\n═══════════════════════════════════════════════\nOBSERVABILITY & LOGGING\n═══════════════════════════════════════════════\nStructured logging with Pino or Winston (never console.log in production). Correlation IDs on all HTTP requests. Distributed tracing with OpenTelemetry. Metrics with Prometheus, dashboards with Grafana. Alerts on SLOs and error budgets. Every backend service must include structured logging by default.\n\n═══════════════════════════════════════════════\nACCESSIBILITY (a11y)\n═══════════════════════════════════════════════\nARIA roles and labels on all interactive elements. Minimum WCAG AA contrast tended bug patterns: stale closures in React hooks (incomplete useCallback/useMemo deps), hydration mismatches in SSR (Next.js/Remix), CORS preflight failures, connection pool exhaustion, circular dependencies causing undefined at runtime, tree shaking failures from side-effect imports, TypeScript type narrowing lost after await, Webpack/Vite chunk splitting breaking dynamic imports.\n\nFix strategy: propose in phases: Phase 1 (minimal hotfix for production now), Phase 2 (correct fix with refactor), Phase 3 (prevention with tests). Always backwards-compatible. Never change public function signatures — create new + deprecate old.\n\n// DEPENDENCIES ASSUMED: [list what is assumed about the rest of the codebase]\n// MISSING CONTEXT: [what would be needed for a perfect fix]\n\n═══════════════════════════════════════════════\nSECURITY ADVANCED (OWASP Complete)\n═══════════════════════════════════════════════\nSSRF: validate and allowlist all external URLs the server processes. Insecure Deserialization: never deserialize unvalidated data. Security headers by default on every HTTP server: Strict-Transport-Security, X-Content-Type-Options, X-Frame-Options, Content-Security-Policy, Permissions-Policy. Cryptography: never MD5/SHA1 for passwords — bcrypt/argon2 for passwords, SHA-256+ for checksums, always random IV. Supply chain: pin exact dependency versions (no ^ ranges in production). Secrets scanning: if hardcoded API key/token/password detected in reviewed code, mark CRITICAL SECURITY ISSUE first. SRI on all external scripts. IDOR: always verify ownership on resource access by ID. Timing attacks: crypto.timingSafeEqual() never === for token comparison. Mass assignment: never pass req.body directly to ORM — always whitelist with pick()/DTOs. Prototype pollution: never merge unvalidated objects. Log injection: sanitize before logging.\n\nSecurity checklist on every endpoint receiving external data:\n// SECURITY CHECKLIST: ✓ input validated ✓ auth checked ✓ rate limited ✓ output sanitized\n\n═══════════════════════════════════════════════\nARCHITECTURE ADVANCED\n═══════════════════════════════════════════════\nAPI versioning mandatory: /v1/ in route or Accept-Version header. Backwards compatibility: adding fields is safe, removing/renaming requires new version. Idempotency keys on all critical write operations (payments, sends, unique resource creation). Design for partial failures: circuit breaker + fallback + timeout on every external call. Saga pattern for distributed transactions with compensating transactions. Event versioning: version field on all events, consumers handle old versions. Bounded contexts: never share domain models between contexts. ADR comments for important architectural decisions: // ADR: [what was chosen and why alternatives were discarded]. Outbox pattern for exactly-once event publishing. Strangler fig for monolith migration. Anti-corruption layer for external integrations. Materialized views for CQRS read models. Every HTTP client: explicit timeout + retry with jitter + circuit breaker.\n\n═══════════════════════════════════════════════\nCODE QUALITY ADVANCED\n═══════════════════════════════════════════════\nCyclomatic complexity max 10 per function. Return early: validate and return on error cases first, happy path last. No boolean parameters (split into two functions or options object). No output parameters (always return new values). Fail fast: validate all preconditions at function start. Consistent abstraction levels within a function. Command Query Separation: a function either modifies state OR returns data, never both. Positive conditionals: if (isValid) over if (!isInvalid). Avoid primitive obsession: branded types for IDs, emails, URLs. Law of Demeter: never a.b.c.d(). Typed error classes: class ValidationError extends Error, never throw new Error(\"generic string\"). Immutability by default: const always, let only when strictly necessary.\n\n═══════════════════════════════════════════════\nDEVOPS               else if (t.includes("===") || t.includes("---")) c = "#C8C0B0";
              return (
                <span key={i}>
                  <span style={{ color:"#252525", userSelect:"none", marginRight:"18px", fontSize:"10px" }}>{String(i+1).padStart(3," ")}</span>
                  <span style={{ color:c }}>{line}</span>{"\n"}
                </span>
              );
            })}
          </pre>
        </div>
      );
    }

    function parseBlocks(text) {
      const out = []; const rx = /```(\w*)\n?([\s\S]*?)```/g; let last = 0, m;
      while ((m = rx.exec(text)) !== null) {
        if (m.index > last) out.push({ type:"text", content:text.slice(last, m.index).trim() });
        if (m[2].trim()) out.push({ type:"code", lang:m[1]||"code", content:m[2] });
        last = m.index + m[0].length;
      }
      if (last < text.length && text.slice(last).trim()) out.push({ type:"text", content:text.slice(last).trim() });
      return out;
    }

    // ─── MAIN APP ─────────────────────────────────────────────────
    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [versions, setVersions] = useState(storage.getVersions);
      const [activePrompt, setActivePrompt] = useState(storage.getActivePrompt);
      const [showAdmin, setShowAdmin] = useState(false);
      const [adminAuthed, setAdminAuthed] = useState(false);
      const [showLogin, setShowLogin] = useState(false);
      const [installPrompt, setInstallPrompt] = useState(null);
      const [showInstallBanner, setShowInstallBanner] = useState(false);
      const scrollRef = useRef(null);
      const textareaRef = useRef(null);

      const activeVersion = versions.length > 0 ? versions.length : 1;

      // PWA Install prompt
      useEffect(() => {
        const handler = (e) => { e.preventDefault(); setInstallPrompt(e); setShowInstallBanner(true); };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const handleInstall = async () => {
        if (!installPrompt) return;
        installPrompt.prompt();
        const { outcome } = await installPrompt.userChoice;
        if (outcome === 'accepted') { setInstallPrompt(null); setShowInstallBanner(false); }
      };

      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages, loading]);

      const autoResize = () => {
        const t = textareaRef.current;
        if (t) { t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 200) + "px"; }
      };

      const saveVersion = (prompt, note) => {
        const newV = { id: Date.now().toString(), prompt, note, timestamp: Date.now() };
        const updated = [...versions, newV];
        setVersions(updated); storage.saveVersions(updated);
        setActivePrompt(prompt); storage.saveActivePrompt(prompt);
      };

      const restoreVersion = (v) => {
        setActivePrompt(v.prompt); storage.saveActivePrompt(v.prompt);
        setShowAdmin(false);
      };

      const sendMessage = async () => {
        const text = input.trim(); if (!text || loading) return;
        const userMsg = { role:"user", content:text, id:Date.now() };
        setMessages(prev => [...prev, userMsg]);
        setInput(""); if(textareaRef.current) textareaRef.current.style.height = "auto";
        setLoading(true);

        const history = [...messages, userMsg].map(m => ({ role:m.role, content:m.content }));

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json", "x-api-key":ANTHROPIC_API_KEY, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-calls":"true" },
            body: JSON.stringify({ model:MODEL, max_tokens:8000, system:activePrompt, messages:history })
          });
          const d = await res.json();
          if (d.error) throw new Error(d.error.message);
          const reply = d.content?.map(b=>b.text||"").join("")||"";
          setMessages(prev => [...prev, { role:"assistant", content:reply, id:Date.now()+1 }]);
        } catch(e) {
          setMessages(prev => [...prev, { role:"assistant", content:`// ERROR: ${e.message}\n// Verifica que tu API key esté configurada correctamente en index.html`, id:Date.now()+1 }]);
        }
        setLoading(false);
      };

      const handleKey = (e) => {
        if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      };

      const openAdmin = () => {
        if (adminAuthed) setShowAdmin(true);
        else setShowLogin(true);
      };

      const isEmpty = messages.length === 0;

      return (
        <div style={{ display:"flex", flexDirection:"column", height:"100%", background:"#FDFCFB" }}>

          {/* NAV */}
          <nav className="safe-top" style={{ height:"46px", borderBottom:"1px solid #F0EDE8", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 16px", background:"#FFFFFF", flexShrink:0, zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
              <TorresLogo size={24}/>
              <span style={{ fontSize:"13px", fontWeight:"800", letterSpacing:"0.18em", color:"#111" }}>TORRES</span>
              <span style={{ fontSize:"9px", fontFamily:"'JetBrains Mono',monospace", background:"#111", color:"#fff", padding:"2px 7px", borderRadius:"2px", letterSpacing:"0.1em" }}>v{activeVersion}</span>
            </div>
            <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
              {messages.length > 0 && (
                <button onClick={()=>setMessages([])} style={{ background:"none", border:"1px solid #E8E4DC", color:"#AAA", borderRadius:"3px", padding:"4px 10px", fontSize:"9px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer", letterSpacing:"0.08em" }}>NUEVA</button>
              )}
              <button onClick={openAdmin} style={{ background:"none", border:"1px solid #E8E4DC", color:"#888", borderRadius:"3px", padding:"4px 10px", fontSize:"9px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer", letterSpacing:"0.08em" }}>ADMIN</button>
            </div>
          </nav>

          {/* MESSAGES AREA */}
          <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"0 16px" }}>
            {isEmpty ? (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", textAlign:"center", gap:"16px", padding:"40px 20px" }}>
                <TorresLogo size={52}/>
                <div>
                  <h1 style={{ fontSize:"clamp(28px,6vw,42px)", fontWeight:"800", letterSpacing:"-0.02em", color:"#111", lineHeight:"1.1", marginBottom:"8px" }}>TORRES</h1>
                  <p style={{ fontSize:"11px", fontFamily:"'JetBrains Mono',monospace", color:"#C8C4BC", letterSpacing:"0.12em" }}>CODE GENERATION ENGINE</p>
                </div>
                <p style={{ fontSize:"13px", color:"#AAA", fontFamily:"'JetBrains Mono',monospace", maxWidth:"340px", lineHeight:"1.7" }}>Describe qué quieres construir.</p>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"8px", justifyContent:"center", maxWidth:"420px" }}>
                  {["API REST con auth JWT","Dashboard React + TypeScript","Script Python de automatización","Sistema de pagos con Stripe"].map(s => (
                    <button key={s} onClick={()=>{ setInput(s); textareaRef.current?.focus(); }}
                      style={{ background:"none", border:"1px solid #E8E4DC", color:"#888", borderRadius:"4px", padding:"6px 12px", fontSize:"10px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer", letterSpacing:"0.04em" }}>{s}</button>
                  ))}
                </div>
              </div>
            ) : (
              <div style={{ maxWidth:"780px", margin:"0 auto", paddingTop:"20px", paddingBottom:"20px" }}>
                {messages.map(msg => (
                  <div key={msg.id} className="fade-in" style={{ marginBottom:"24px" }}>
                    {msg.role==="user" ? (
                      <div style={{ display:"flex", justifyContent:"flex-end" }}>
                        <div style={{ background:"#111", color:"#E8E4DC", borderRadius:"12px 12px 2px 12px", padding:"11px 16px", maxWidth:"80%", fontSize:"13px", lineHeight:"1.6", fontFamily:"'JetBrains Mono',monospace" }}>{msg.content}</div>
                      </div>
                    ) : (
                      <div>
                        <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"10px" }}>
                          <TorresLogo size={16}/>
                          <span style={{ fontSize:"9px", fontFamily:"'JetBrains Mono',monospace", color:"#C8C4BC", letterSpacing:"0.12em" }}>TORRES v{activeVersion}</span>
                        </div>
                        {parseBlocks(msg.content).map((block, bi) => (
                          block.type==="code"
                            ? <CodeBlock key={bi} content={block.content} lang={block.lang}/>
                            : <p key={bi} style={{ fontSize:"13px", color:"#444", lineHeight:"1.8", marginBottom:"8px", fontFamily:"'JetBrains Mono',monospace" }}>{block.content}</p>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
                {loading && (
                  <div style={{ display:"flex", alignItems:"center", gap:"10px", padding:"10px 0" }}>
                    <TorresLogo size={16}/>
                    <div style={{ display:"flex", gap:"4px" }}>
                      {[0,1,2].map(i => <span key={i} style={{ width:"4px", height:"4px", background:"#CCC", borderRadius:"50%", display:"inline-block", animation:`pulse 1.2s ease ${i*0.2}s infinite` }}/>)}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* INPUT BAR */}
          <div className="safe-bottom" style={{ borderTop:"1px solid #F0EDE8", padding:"12px 16px", background:"#FFFFFF", flexShrink:0 }}>
            <div style={{ maxWidth:"780px", margin:"0 auto", display:"flex", gap:"10px", alignItems:"flex-end" }}>
              <textarea ref={textareaRef} value={input}
                onChange={e=>{ setInput(e.target.value); autoResize(); }}
                onKeyDown={handleKey}
                placeholder="Describe qué quieres construir..."
                rows={1}
                style={{ flex:1, border:"1px solid #E4E0D8", borderRadius:"8px", padding:"11px 14px", fontSize:"13px", fontFamily:"'JetBrains Mono',monospace", color:"#111", background:"#FDFCFB", outline:"none", lineHeight:"1.6", resize:"none", overflow:"hidden", minHeight:"44px", maxHeight:"200px" }}/>
              <button onClick={sendMessage} disabled={loading||!input.trim()}
                style={{ background:loading||!input.trim()?"#F4F2EE":"#111", color:loading||!input.trim()?"#C8C4BC":"#FFFFFF", border:"none", borderRadius:"8px", width:"44px", height:"44px", cursor:loading||!input.trim()?"not-allowed":"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:"18px", transition:"background .15s" }}>
                {loading ? <span style={{ width:"14px",height:"14px",border:"2px solid #BBB",borderTopColor:"#777",borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite" }}/> : "↑"}
              </button>
            </div>
          </div>

          {/* MODALS */}
          {showLogin && <AdminLogin onSuccess={()=>{ setAdminAuthed(true); setShowLogin(false); setShowAdmin(true); }} onClose={()=>setShowLogin(false)}/>}
          {showAdmin && <AdminPanel currentPrompt={activePrompt} onSave={saveVersion} onClose={()=>setShowAdmin(false)} versions={versions} onRestore={restoreVersion}/>}

          {/* PWA INSTALL BANNER */}
          {showInstallBanner && (
            <div className="install-banner">
              <span style={{ fontSize:"20px" }}>📲</span>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:"12px", fontWeight:"700", letterSpacing:"0.05em" }}>Instalar TORRES</p>
                <p style={{ fontSize:"11px", color:"#888" }}>Añadir a pantalla de inicio</p>
              </div>
              <button onClick={handleInstall} style={{ background:"#fff", color:"#111", border:"none", borderRadius:"4px", padding:"6px 14px", fontSize:"11px", fontWeight:"700", cursor:"pointer" }}>INSTALAR</button>
              <button onClick={()=>setShowInstallBanner(false)} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:"18px", padding:"0 4px" }}>×</button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App/>, document.getElementById('root'));
  </script>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('TORRES SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
